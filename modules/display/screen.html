<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetzgerPost — Display</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { cursor:none; background:#000; width:100vw; height:100vh; overflow:hidden; display:flex; align-items:center; justify-content:center; }

    #screen {
      position:relative;
      width:100vw; height:calc(100vw * 9/16);
      max-height:100vh; max-width:calc(100vh * 16/9);
    }

    #bg-image {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:fill; transition:opacity 0.5s ease;
    }

    #overlay { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

    #datum-overlay {
      position:absolute; top:5%; left:50%; transform:translateX(-50%);
      font-size:2.2vw; font-weight:700; color:#2d2d2d;
      white-space:nowrap; font-family:Georgia,serif; pointer-events:none;
    }

    .day-circle {
      position:absolute; border-radius:50%; overflow:hidden;
      border:3px solid #fff; box-shadow:0 3px 12px rgba(0,0,0,.25);
      transform:translate(-50%,-50%);
    }
    .day-circle img { width:100%; height:100%; object-fit:cover; }
    .day-circle .placeholder {
      width:100%; height:100%;
      background:linear-gradient(135deg,#87CEEB,#90EE90);
      display:flex; align-items:center; justify-content:center; font-size:1.5em;
    }

    .day-text {
      position:absolute; text-align:center; transform:translateX(-50%);
      font-family:Georgia,serif; line-height:1.3; pointer-events:none;
    }

    .day-price {
      position:absolute; transform:translate(-50%,-50%);
      font-family:Georgia,serif; font-weight:700; text-align:center; pointer-events:none;
    }

    .fade-in { animation:fadeIn .6s ease both; }
    @keyframes fadeIn { from{opacity:0;transform:translate(-50%,calc(-50% + 8px))} to{opacity:1;transform:translate(-50%,-50%)} }
    .day-text.fade-in { animation:fadeInText .6s ease both; }
    @keyframes fadeInText { from{opacity:0;transform:translateX(-50%) translateY(6px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* Sonderlayout Overlay */
    #sonder-overlay {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:fill; opacity:0; transition:opacity 0.6s ease; z-index:10;
    }
    #sonder-overlay.show { opacity:1; }

    #no-content {
      display:none; position:absolute; inset:0;
      background:#e8e4de; align-items:center; justify-content:center;
      flex-direction:column; gap:16px; z-index:5;
    }
    #no-content.show { display:flex; }
    #no-content h1 { font-size:4vw; color:#2d4a2d; font-family:Georgia,serif; }
    #no-content p  { font-size:2vw; color:#666; }

    #timer-bar { position:absolute; bottom:0; left:0; height:6px; background:#2d6a4f; transition:none; z-index:20; }

    #status-bar {
      position:fixed; bottom:0; left:0; right:0; height:24px;
      background:rgba(0,0,0,.45); display:flex; align-items:center;
      justify-content:space-between; padding:0 14px;
      font-family:monospace; font-size:11px; color:rgba(255,255,255,.5);
      z-index:999; pointer-events:none;
    }
    .s-live { display:flex; align-items:center; gap:5px; color:#5cad7a; }
    .s-dot { width:5px; height:5px; border-radius:50%; background:#5cad7a; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Editor */
    #editor-panel {
      display:none; position:fixed; top:0; right:0; bottom:24px; width:320px;
      background:rgba(15,13,11,.95); border-left:1px solid #2e2a24;
      overflow-y:auto; z-index:100; padding:16px;
      font-family:'DM Sans',sans-serif; color:#f0ece4; pointer-events:all;
    }
    #editor-panel.open { display:block; }
    .ep-title { font-size:14px; font-weight:700; color:#d4853a; margin-bottom:12px; text-transform:uppercase; letter-spacing:.5px; }
    .ep-day { background:#1a1714; border:1px solid #2e2a24; border-radius:8px; padding:12px; margin-bottom:10px; }
    .ep-day-name { font-size:12px; font-weight:700; margin-bottom:8px; color:#d4853a; }
    .ep-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .ep-row label { font-size:11px; color:#8a8070; width:80px; flex-shrink:0; }
    .ep-row input[type=number] { flex:1; background:#242018; border:1px solid #2e2a24; border-radius:4px; color:#f0ece4; padding:4px 6px; font-size:12px; outline:none; }
    .ep-row input[type=number]:focus { border-color:#d4853a; }
    .ep-row select { flex:1; background:#242018; border:1px solid #2e2a24; border-radius:4px; color:#f0ece4; padding:4px 6px; font-size:12px; outline:none; }
    .ep-btn { width:100%; padding:10px; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; margin-top:8px; }
    .ep-btn-save { background:#d4853a; color:#fff; }
    .ep-btn-save:hover { background:#e8a055; }
    .ep-btn-test { background:#242018; color:#8a8070; border:1px solid #2e2a24; margin-bottom:8px; }
    .ep-day-slider { display:flex; gap:4px; margin-bottom:12px; }
    .ep-day-btn { flex:1; padding:6px 4px; border:1px solid #2e2a24; border-radius:4px; background:#242018; color:#8a8070; font-size:11px; cursor:pointer; text-align:center; }
    .ep-day-btn.active { border-color:#d4853a; color:#d4853a; background:rgba(212,133,58,.1); }
    .drag-handle { cursor:move !important; pointer-events:all !important; }
    .drag-handle:hover { outline:2px dashed #d4853a; outline-offset:3px; }

    #editor-open-btn {
      position:fixed; bottom:40px; right:16px;
      background:rgba(212,133,58,.9); color:#fff; border:none;
      border-radius:50%; width:48px; height:48px; font-size:20px;
      cursor:pointer; z-index:9998; box-shadow:0 2px 12px rgba(0,0,0,.4);
    }
  </style>
</head>

<script>
// ── Konstanten ──
var SUPABASE_URL  = 'https://jfrqbchgrpixwlecerax.supabase.co'
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcnFiY2hncnBpeHdsZWNlcmF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODk5NDksImV4cCI6MjA5MDE2NTk0OX0.AnSqi2rJ46PN8dm6zMUgRDNMdXlwRRaES4JQ4Fozn10'

function getParam(n){var s=window.location.search;if(!s)return null;var p=s.substring(1).split('&');for(var i=0;i<p.length;i++){var kv=p[i].split('=');if(decodeURIComponent(kv[0])===n)return kv.length>1?decodeURIComponent(kv[1]):''}return null}

var KUNDE_ID  = getParam('kunde')  || 'demo'
var SCREEN_ID = getParam('screen') || 'screen1'
var IS_EDITOR = getParam('editor') === 'true'

var DAY_MAP    = {1:'montag',2:'dienstag',3:'mittwoch',4:'donnerstag',5:'freitag',6:'samstag',0:'sonntag'}
var DAY_LABELS = {montag:'Montag',dienstag:'Dienstag',mittwoch:'Mittwoch',donnerstag:'Donnerstag',freitag:'Freitag',samstag:'Samstag'}

var LAYOUTS = {
  dienstag:   'assets/Bildschirm_1_Dienstag.png',
  mittwoch:   'assets/Bildschirm_1_Mittwoch.png',
  donnerstag: 'assets/Bildschirm_1_Donnerstag.png',

}
// Mo/Sa/So: Dienstag-Layout (kein Highlighting)
LAYOUTS.montag   = LAYOUTS.dienstag
LAYOUTS.samstag  = LAYOUTS.dienstag
LAYOUTS.sonntag  = LAYOUTS.dienstag

var CONFIG = {
  dienstag:   {img:{x:12.5,y:30,r:3.8},text:{x:12.5,y:55,w:20,size:1.8},preis:{x:12.5,y:70,size:1.5,color:'#1a1a1a'}},
  mittwoch:   {img:{x:37.5,y:32,r:3.2},text:{x:37.5,y:55,w:18,size:1.4},preis:{x:37.5,y:68,size:1.2,color:'#ffffff'}},
  donnerstag: {img:{x:62.5,y:32,r:3.2},text:{x:62.5,y:55,w:18,size:1.4},preis:{x:62.5,y:68,size:1.2,color:'#1a1a1a'}},
  freitag:    {img:{x:87.5,y:32,r:3.2},text:{x:87.5,y:55,w:18,size:1.4},preis:{x:87.5,y:68,size:1.2,color:'#ffffff'}},
}

var sb = null
var currentContent = null
var overrideLayout = null

// ── Rotation ──
var _rotTimer = null
var _rotIdx   = 0
var _rotItems = []  // [{type:'mittagstisch',data:...} | {type:'sonder',data:...}]
var _rotSek   = 10

function startRotation(items, sek) {
  if (_rotTimer) clearInterval(_rotTimer)
  _rotItems = items
  _rotSek   = sek || 10
  _rotIdx   = 0
  zeigeItem(0)
  if (items.length > 1) {
    _rotTimer = setInterval(function(){
      _rotIdx = (_rotIdx + 1) % _rotItems.length
      zeigeItem(_rotIdx)
    }, _rotSek * 1000)
    animateTimerBar()
  }
}

function animateTimerBar() {
  var bar = document.getElementById('timer-bar')
  bar.style.transition = 'none'
  bar.style.width = '0%'
  setTimeout(function(){
    bar.style.transition = 'width ' + _rotSek + 's linear'
    bar.style.width = '100%'
  }, 50)
}

function zeigeItem(idx) {
  var item = _rotItems[idx]
  if (!item) return
  animateTimerBar()

  if (item.type === 'mittagstisch') {
    // Sonderlayout ausblenden
    var so = document.getElementById('sonder-overlay')
    so.className = ''
    so.src = ''
    document.getElementById('no-content').className = ''
    renderDisplay(item.data)

  } else if (item.type === 'sonder') {
    // Gerichte-Overlay leeren
    document.getElementById('gerichte-overlay').innerHTML = ''
    document.getElementById('datum-overlay').textContent = ''
    document.getElementById('no-content').className = ''
    // Sonderbild einblenden
    var so2 = document.getElementById('sonder-overlay')
    so2.className = ''
    so2.onload = function(){ so2.className = 'show' }
    so2.src = item.data.bild + '?t=' + Date.now()
    document.getElementById('s-text').textContent = 'Sonderlayout · ' + (item.data.label || '')
  }
}

// ── Hilfsfunktionen ──
function getKW(d) {
  d = d || new Date()
  var date = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()))
  date.setUTCDate(date.getUTCDate()+4-(date.getUTCDay()||7))
  var y = new Date(Date.UTC(date.getUTCFullYear(),0,1))
  return Math.ceil((((date-y)/86400000)+1)/7)
}

function localDateStr(d) {
  d = d || new Date()
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')
}

function getMondayStr(d) {
  d = d || new Date()
  var dow = d.getDay()
  var mon = new Date(d)
  mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1))
  return localDateStr(mon)
}

function getTodayKey() {
  if (overrideLayout) return overrideLayout
  if (IS_EDITOR) { var t = getParam('testday'); if(t) return DAY_MAP[parseInt(t)] || null }
  return DAY_MAP[new Date().getDay()] || null
}

function findAktiveWoche(wochen) {
  var montagHeute = getMondayStr()
  for (var i = 0; i < wochen.length; i++) {
    var w = wochen[i]
    if (!w.gueltig_ab) continue
    var ab = new Date(w.gueltig_ab + 'T00:00:00')
    var abDow = ab.getDay()
    var abMon = new Date(ab)
    abMon.setDate(ab.getDate() - (abDow === 0 ? 6 : abDow - 1))
    var bis = new Date(abMon)
    bis.setDate(abMon.getDate() + 6)
    if (montagHeute >= localDateStr(abMon) && montagHeute <= localDateStr(bis)) return w
  }
  return null
}

// ── Display rendern ──
function renderDisplay(content) {
  if (!content) return
  currentContent = content
  var todayKey = getTodayKey()

  // Fallback: ersten verfügbaren Tag nehmen
  if (todayKey && content.gerichte && !content.gerichte[todayKey]) {
    var tage = ['dienstag','mittwoch','donnerstag','freitag']
    for (var t = 0; t < tage.length; t++) {
      if (content.gerichte[tage[t]]) { overrideLayout = tage[t]; todayKey = tage[t]; break }
    }
  }

  if (!todayKey) { document.getElementById('no-content').className = 'show'; return }
  document.getElementById('no-content').className = ''

  // Hintergrundbild
  var bgImg = document.getElementById('bg-image')
  var newSrc = LAYOUTS[todayKey]
  if (newSrc && bgImg.getAttribute('data-src') !== newSrc) {
    bgImg.style.opacity = '0'
    var tmp = new Image()
    tmp.onload = function(){ bgImg.src = newSrc; bgImg.style.opacity='1'; bgImg.setAttribute('data-src',newSrc) }
    tmp.src = newSrc
  }

  // Datum
  document.getElementById('datum-overlay').textContent = content.woche || ''

  // Gerichte
  var overlay = document.getElementById('gerichte-overlay')
  overlay.innerHTML = ''
  var gerichte = content.gerichte || {}
  var screenEl = document.getElementById('screen'); var screenW = screenEl ? screenEl.offsetWidth : window.innerWidth

  console.log('forEach start', Object.keys(gerichte)); ['dienstag','mittwoch','donnerstag','freitag'].forEach(function(day) { console.log('day:', day, 'append to:', overlay.id);
    var m = gerichte[day] && gerichte[day][0]
    if (!m || !m.name) return
    var cfg = CONFIG[day]
    var isToday = day === todayKey
    var edClass = IS_EDITOR ? ' drag-handle' : ''

    var imgSize = (cfg.img.r/100) * screenW * 2
    var imgEl = document.createElement('div')
    imgEl.className = 'day-circle fade-in' + edClass
    imgEl.setAttribute('data-day', day)
    imgEl.setAttribute('data-type', 'img')
    imgEl.style.cssText = 'left:'+cfg.img.x+'%;top:'+cfg.img.y+'%;width:'+imgSize+'px;height:'+imgSize+'px;'
    if (m.bild) {
      var bildSrc = m.bild && m.bild.startsWith('/') ? m.bild : '../../' + m.bild
      imgEl.innerHTML = '<img src="' + bildSrc + '" onerror="this.parentNode.innerHTML=\'<div class=placeholder>🍽️</div>\'">'
    } else {
      imgEl.innerHTML = '<div class="placeholder">🍽️</div>'
    }
    overlay.appendChild(imgEl)

    var txtEl = document.createElement('div')
    txtEl.className = 'day-text fade-in' + edClass
    txtEl.setAttribute('data-day', day)
    txtEl.setAttribute('data-type', 'text')
    txtEl.style.cssText = 'left:'+cfg.text.x+'%;top:'+cfg.text.y+'%;width:'+cfg.text.w+'%;font-size:'+(isToday?cfg.text.size*1.3:cfg.text.size)+'vw;font-weight:'+(isToday?800:600)+';color:#1a1a1a;'
    txtEl.textContent = m.name
    overlay.appendChild(txtEl)

    if (m.preis) {
      var prEl = document.createElement('div')
      prEl.className = 'day-price fade-in' + edClass
      prEl.setAttribute('data-day', day)
      prEl.setAttribute('data-type', 'preis')
      prEl.style.cssText = 'left:'+cfg.preis.x+'%;top:'+cfg.preis.y+'%;font-size:'+(isToday?cfg.preis.size*1.2:cfg.preis.size)+'vw;color:'+cfg.preis.color+';'
      prEl.textContent = m.preis
      overlay.appendChild(prEl)
    }
  })

  document.getElementById('s-text').textContent = 'Live · KW ' + getKW() + ' · ' + (DAY_LABELS[todayKey]||'Heute')
}

// ── Hauptlade-Funktion ──
function loadContent() {
  if (!sb) { showNoContent(); return }

  Promise.all([
    sb.from('displays').select('content').eq('kunde_id',KUNDE_ID).eq('screen_id',SCREEN_ID).limit(1),
    sb.from('displays').select('content').eq('kunde_id',KUNDE_ID).eq('screen_id','sonder_configs').limit(1),
    sb.from('displays').select('content').eq('kunde_id',KUNDE_ID).eq('screen_id','mt_settings').limit(1),
    sb.from('wochen').select('*').eq('kunde_id',KUNDE_ID).order('gueltig_ab',{ascending:false}).limit(20)
  ]).then(function(res) {
    var dispContent = res[0].data && res[0].data[0] ? res[0].data[0].content : null
    var sonderContent = res[1].data && res[1].data[0] ? res[1].data[0].content : null
    var mtContent = res[2].data && res[2].data[0] ? res[2].data[0].content : null
    var wochen = res[3].data || []

    // Editor-Modus: nur Mittagstisch, keine Rotation
    if (IS_EDITOR) {
      var aktiv = findAktiveWoche(wochen)
      if (aktiv) renderDisplay({woche:aktiv.woche_label||'',gerichte:aktiv.gerichte||{}})
      else showDemo()
      return
    }

    // Manueller Override
    if (dispContent && dispContent.manualDay) {
      overrideLayout = DAY_MAP[dispContent.manualDay] || null
      renderDisplay(dispContent)
      return
    }
    overrideLayout = null

    // MT-Tage
    var mtTage = mtContent && mtContent.tage ? mtContent.tage : [2,3,4,5]
    var heute = new Date().getDay()
    var istMtTag = mtTage.indexOf(heute) >= 0

    // Sonderlayouts für heute
    var sonder = []
    if (sonderContent && sonderContent.layouts) {
      var heuteDatum = localDateStr()
      var layouts = sonderContent.layouts
      for (var i = 0; i < layouts.length; i++) {
        var lay = layouts[i]
        if (lay.type === 'datum' && lay.datum === heuteDatum) sonder.unshift(lay)
        else if (lay.type === 'wochentage' && lay.wochentage && lay.wochentage.indexOf(heute) >= 0) sonder.push(lay)
      }
    }

    // Alle Inhalte sammeln
    var items = []
    if (istMtTag) {
      var aktiv2 = findAktiveWoche(wochen)
      if (aktiv2) items.push({type:'mittagstisch', data: aktiv2})
    }
    for (var j = 0; j < sonder.length; j++) items.push({type:'sonder', data: sonder[j]})

    if (items.length > 0) startRotation(items, 10)
    else showNoContent()

  }).catch(function(e) { console.error(e); showDemo() })
}

function showNoContent() {
  document.getElementById('no-content').className = 'show'
  document.getElementById('sonder-overlay').className = ''
  document.getElementById('gerichte-overlay').innerHTML = ''
}

  renderDisplay({

      donnerstag: [{name:'Cordon Bleu',           preis:'6,80 €', bild:null}],
      freitag:    [{name:'Backfisch',             preis:'6,80 €', bild:null}]
    }
  })
  document.getElementById('s-text').textContent = 'Demo-Modus'
}

// ── Reload-Trigger ──
var _lastUpdatedAt = null
function startReloadTrigger() {
  if (!sb) return
  setInterval(function(){
    sb.from('displays').select('updated_at').eq('kunde_id',KUNDE_ID).eq('screen_id',SCREEN_ID).limit(1)
      .then(function(r){
        var d = r && r.data && r.data[0]
        if (!d) return
        if (_lastUpdatedAt && d.updated_at !== _lastUpdatedAt) { loadContent() }
        _lastUpdatedAt = d.updated_at
      }).catch(function(){})
  }, 30000)
}

// ── Config ──
async function loadConfig() {
  try {
    var r = await sb.from('display_configs').select('config').eq('kunde_id',KUNDE_ID).eq('screen_id',SCREEN_ID).limit(1)
    if (r.data && r.data[0] && r.data[0].config) {
      var c = r.data[0].config
      // Nur laden wenn Struktur stimmt (hat img/text/preis)
      if (c.dienstag && c.dienstag.img && c.dienstag.text) {
        CONFIG = Object.assign(CONFIG, c)
      }
    }
  } catch(e) {}
}

async function saveConfig() {
  var days = ['dienstag','mittwoch','donnerstag','freitag']
  days.forEach(function(day) {
    var v = function(id, fallback){ var el=document.getElementById(id); return el?parseFloat(el.value)||fallback:fallback }
    CONFIG[day].img.x    = v(day+'_img_x', CONFIG[day].img.x)
    CONFIG[day].img.y    = v(day+'_img_y', CONFIG[day].img.y)
    CONFIG[day].img.r    = v(day+'_img_r', CONFIG[day].img.r)
    CONFIG[day].text.x   = v(day+'_text_x', CONFIG[day].text.x)
    CONFIG[day].text.y   = v(day+'_text_y', CONFIG[day].text.y)
    CONFIG[day].text.size= v(day+'_text_size', CONFIG[day].text.size)
    CONFIG[day].preis.x  = v(day+'_preis_x', CONFIG[day].preis.x)
    CONFIG[day].preis.y  = v(day+'_preis_y', CONFIG[day].preis.y)
    CONFIG[day].preis.size= v(day+'_preis_size', CONFIG[day].preis.size)
    var pc = document.getElementById(day+'_preis_color'); if(pc) CONFIG[day].preis.color = pc.value
  })
  try {
    await sb.from('display_configs').upsert({kunde_id:KUNDE_ID,screen_id:SCREEN_ID,config:CONFIG},{onConflict:'kunde_id,screen_id'})
    document.getElementById('s-text').textContent = '✓ Gespeichert!'
    if (currentContent) renderDisplay(currentContent)
  } catch(e) { document.getElementById('s-text').textContent = 'Fehler' }
}

// ── Realtime ──
function subscribeRealtime() {
  if (!sb) return
  try {
    sb.channel('disp-'+SCREEN_ID)
      .on('postgres_changes',{event:'*',schema:'public',table:'displays',filter:'kunde_id=eq.'+KUNDE_ID},
        function(p){ if(p.new && p.new.content) loadContent() })
      .subscribe(function(s){ if(s==='SUBSCRIBED') document.getElementById('s-text').textContent='● Live' })
  } catch(e) {}
}

// ── Editor ──
function toggleEditor() {
  var ep = document.getElementById('editor-panel')
  var btn = document.getElementById('editor-open-btn')
  ep.classList.toggle('open')
  if (btn) btn.style.display = ep.classList.contains('open') ? 'none' : 'block'
  if (ep.classList.contains('open')) buildEditorUI()
}

function livePreview() {
  var days = ['dienstag','mittwoch','donnerstag','freitag']
  days.forEach(function(day) {
    var g = function(id){ var el=document.getElementById(id); return el?parseFloat(el.value):null }
    if(g(day+'_img_x')!==null) CONFIG[day].img.x = g(day+'_img_x')
    if(g(day+'_img_y')!==null) CONFIG[day].img.y = g(day+'_img_y')
    if(g(day+'_img_r')!==null) CONFIG[day].img.r = g(day+'_img_r')
    if(g(day+'_text_x')!==null) CONFIG[day].text.x = g(day+'_text_x')
    if(g(day+'_text_y')!==null) CONFIG[day].text.y = g(day+'_text_y')
    if(g(day+'_preis_x')!==null) CONFIG[day].preis.x = g(day+'_preis_x')
    if(g(day+'_preis_y')!==null) CONFIG[day].preis.y = g(day+'_preis_y')
  })
  if (currentContent) renderDisplay(currentContent); else showDemo()
}

function buildEditorUI() {
  var el = document.getElementById('ep-positions')
  var days = ['dienstag','mittwoch','donnerstag','freitag']
  var DAY_LBL = {dienstag:'Dienstag',mittwoch:'Mittwoch',donnerstag:'Donnerstag',freitag:'Freitag'}
  el.innerHTML = days.map(function(day){
    var c = CONFIG[day]
    return '<div class="ep-day"><div class="ep-day-name">'+DAY_LBL[day]+'</div>'+
      '<div class="ep-row"><label>Bild X %</label><input type="number" id="'+day+'_img_x" value="'+c.img.x+'" step="0.5" oninput="livePreview()"></div>'+
      '<div class="ep-row"><label>Bild Y %</label><input type="number" id="'+day+'_img_y" value="'+c.img.y+'" step="0.5" oninput="livePreview()"></div>'+
      '<div class="ep-row"><label>Bild Radius</label><input type="number" id="'+day+'_img_r" value="'+c.img.r+'" step="0.1" oninput="livePreview()"></div>'+
      '<div class="ep-row"><label>Text X %</label><input type="number" id="'+day+'_text_x" value="'+c.text.x+'" step="0.5" oninput="livePreview()"></div>'+
      '<div class="ep-row"><label>Text Y %</label><input type="number" id="'+day+'_text_y" value="'+c.text.y+'" step="0.5" oninput="livePreview()"></div>'+
      '<div class="ep-row"><label>Text Größe</label><input type="number" id="'+day+'_text_size" value="'+c.text.size+'" step="0.1"></div>'+
      '<div class="ep-row"><label>Preis X %</label><input type="number" id="'+day+'_preis_x" value="'+c.preis.x+'" step="0.5" oninput="livePreview()"></div>'+
      '<div class="ep-row"><label>Preis Y %</label><input type="number" id="'+day+'_preis_y" value="'+c.preis.y+'" step="0.5" oninput="livePreview()"></div>'+
      '<div class="ep-row"><label>Preis Größe</label><input type="number" id="'+day+'_preis_size" value="'+c.preis.size+'" step="0.1"></div>'+
      '<div class="ep-row"><label>Preis Farbe</label><select id="'+day+'_preis_color">'+
        '<option value="#1a1a1a"'+(c.preis.color==='#1a1a1a'?' selected':'')+'>Dunkel</option>'+
        '<option value="#ffffff"'+(c.preis.color==='#ffffff'?' selected':'')+'>Weiß</option>'+
      '</select></div></div>'
  }).join('')
}

function setTestDay(day, btn) {
  overrideLayout = DAY_MAP[day] || null
  document.querySelectorAll('.ep-day-btn').forEach(function(b){ b.classList.remove('active') })
  btn.classList.add('active')
  if (currentContent) renderDisplay(currentContent); else showDemo()
}

// ── Start ──
window.addEventListener('DOMContentLoaded', async function() {
  // Uhr
  setInterval(function(){
    var n = new Date()
    document.getElementById('s-time').textContent = n.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' · KW ' + getKW()
  }, 1000)

  // Supabase
  if (window.supabase) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON)
    await loadConfig()
    loadContent()
    subscribeRealtime()
    startReloadTrigger()
  } else {
    showDemo()
  }

  // Editor
  if (IS_EDITOR) {
    document.getElementById('editor-panel').classList.add('open')
    document.getElementById('editor-open-btn').style.display = 'none'
    buildEditorUI()
  } // Editor-Button bleibt versteckt im normalen Modus

  // Mitternacht-Reload
  var now = new Date(), midnight = new Date(now)
  midnight.setHours(24,0,5,0)
  setTimeout(function(){ loadContent(); setInterval(loadContent, 86400000) }, midnight-now)
})
</script>
