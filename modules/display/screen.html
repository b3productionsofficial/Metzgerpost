<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetzgerPost — Display</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:#000;
      width:100vw; height:100vh;
      overflow:hidden;
      display:flex; align-items:center; justify-content:center;
    }

    /* 16:9 Container — füllt immer den ganzen Bildschirm */
    #screen {
      position:relative;
      width:100vw;
      height:calc(100vw * 9/16);
      max-height:100vh;
      max-width:calc(100vh * 16/9);
    }

    #bg-image {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:fill;
      transition:opacity 0.5s ease;
    }

    #overlay {
      position:absolute; inset:0;
      width:100%; height:100%;
      pointer-events:none;
    }

    /* Datum */
    #datum-overlay {
      position:absolute;
      top:5%;
      left:50%;
      transform:translateX(-50%);
      font-size:2.2vw;
      font-weight:700;
      color:#2d2d2d;
      white-space:nowrap;
      font-family:Georgia,serif;
      pointer-events:none;
    }

    /* Gericht Overlays */
    .day-circle {
      position:absolute;
      border-radius:50%;
      overflow:hidden;
      border:3px solid #fff;
      box-shadow:0 3px 12px rgba(0,0,0,.25);
      transform:translate(-50%,-50%);
    }
    .day-circle img {
      width:100%; height:100%; object-fit:cover;
    }
    .day-circle .placeholder {
      width:100%; height:100%;
      background:linear-gradient(135deg,#87CEEB,#90EE90);
      display:flex; align-items:center; justify-content:center;
      font-size:1.5em;
    }

    .day-text {
      position:absolute;
      text-align:center;
      transform:translateX(-50%);
      font-family:Georgia,serif;
      line-height:1.3;
      pointer-events:none;
    }

    .day-price {
      position:absolute;
      transform:translate(-50%,-50%);
      font-family:Georgia,serif;
      font-weight:700;
      text-align:center;
      pointer-events:none;
    }

    /* Fade Animation */
    .fade-in { animation:fadeIn .6s ease both; }
    @keyframes fadeIn { from{opacity:0;transform:translate(-50%,calc(-50% + 8px))} to{opacity:1;transform:translate(-50%,-50%)} }
    .day-text.fade-in { animation:fadeInText .6s ease both; }
    @keyframes fadeInText { from{opacity:0;transform:translateX(-50%) translateY(6px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* Wochenende */
    #no-content {
      display:none; position:absolute; inset:0;
      background:#e8e4de;
      align-items:center; justify-content:center;
      flex-direction:column; gap:16px;
    }
    #no-content.show { display:flex; }
    #no-content h1 { font-size:4vw; color:#2d4a2d; font-family:Georgia,serif; }
    #no-content p  { font-size:2vw; color:#666; }

    /* Status Bar */
    #status-bar {
      position:fixed; bottom:0; left:0; right:0; height:24px;
      background:rgba(0,0,0,.45);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 14px;
      font-family:monospace; font-size:11px; color:rgba(255,255,255,.5);
      z-index:999; pointer-events:none;
    }
    .s-live { display:flex; align-items:center; gap:5px; color:#5cad7a; }
    .s-dot  { width:5px; height:5px; border-radius:50%; background:#5cad7a; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ══ EDITOR MODE ══ */
    #editor-panel {
      display:none;
      position:fixed; top:0; right:0; bottom:24px;
      width:320px;
      background:rgba(15,13,11,.95);
      border-left:1px solid #2e2a24;
      overflow-y:auto;
      z-index:100;
      padding:16px;
      font-family:'DM Sans',sans-serif;
      color:#f0ece4;
      pointer-events:all;
    }
    #editor-panel.open { display:block; }
    .ep-title { font-size:14px; font-weight:700; color:#d4853a; margin-bottom:12px; text-transform:uppercase; letter-spacing:.5px; }
    .ep-day { background:#1a1714; border:1px solid #2e2a24; border-radius:8px; padding:12px; margin-bottom:10px; }
    .ep-day-name { font-size:12px; font-weight:700; margin-bottom:8px; color:#d4853a; }
    .ep-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .ep-row label { font-size:11px; color:#8a8070; width:80px; flex-shrink:0; }
    .ep-row input[type=number] {
      flex:1; background:#242018; border:1px solid #2e2a24; border-radius:4px;
      color:#f0ece4; padding:4px 6px; font-size:12px; outline:none;
    }
    .ep-row input[type=number]:focus { border-color:#d4853a; }
    .ep-row select {
      flex:1; background:#242018; border:1px solid #2e2a24; border-radius:4px;
      color:#f0ece4; padding:4px 6px; font-size:12px; outline:none;
    }
    .ep-btn {
      width:100%; padding:10px; border:none; border-radius:6px;
      font-size:13px; font-weight:600; cursor:pointer; margin-top:8px;
    }
    .ep-btn-save { background:#d4853a; color:#fff; }
    .ep-btn-save:hover { background:#e8a055; }
    .ep-btn-test { background:#242018; color:#8a8070; border:1px solid #2e2a24; margin-bottom:8px; }
    .ep-day-slider { display:flex; gap:4px; margin-bottom:12px; }
    .ep-day-btn { flex:1; padding:6px 4px; border:1px solid #2e2a24; border-radius:4px; background:#242018; color:#8a8070; font-size:11px; cursor:pointer; text-align:center; }
    .ep-day-btn.active { border-color:#d4853a; color:#d4853a; background:rgba(212,133,58,.1); }

    /* Drag handles im Editor-Modus */
    .drag-handle {
      cursor:move !important;
      pointer-events:all !important;
    }
    .drag-handle:hover { outline:2px dashed #d4853a; outline-offset:3px; }
  </style>
</head>
<body>

<div id="screen">
  <img id="bg-image" src="" alt="">
  <div id="overlay">
    <div id="datum-overlay"></div>
    <div id="gerichte-overlay"></div>
  </div>
  <div id="no-content">
    <h1>Metzgerei Sorg &amp; Seitz</h1>
    <p>Heute kein Mittagstisch</p>
  </div>
</div>

<!-- Editor Panel -->
<div id="editor-panel">
  <div class="ep-title">⚙️ Position Editor</div>

  <div class="ep-day-slider" id="ep-testday-btns">
    <div class="ep-day-btn active" onclick="setTestDay(2,this)">Di</div>
    <div class="ep-day-btn" onclick="setTestDay(3,this)">Mi</div>
    <div class="ep-day-btn" onclick="setTestDay(4,this)">Do</div>
    <div class="ep-day-btn" onclick="setTestDay(5,this)">Fr</div>
  </div>

  <div id="ep-positions"></div>

  <button class="ep-btn ep-btn-save" onclick="saveConfig()">💾 Positionen speichern</button>
  <button class="ep-btn ep-btn-test" onclick="toggleEditor()">✕ Editor schließen</button>
</div>

<div id="status-bar">
  <div class="s-live"><div class="s-dot"></div><span id="s-text">Verbinde…</span></div>
  <span id="s-time"></span>
</div>

<script>
const SUPABASE_URL  = 'https://jfrqbchgrpixwlecerax.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcnFiY2hncnBpeHdsZWNlcmF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODk5NDksImV4cCI6MjA5MDE2NTk0OX0.AnSqi2rJ46PN8dm6zMUgRDNMdXlwRRaES4JQ4Fozn10'
const params    = new URLSearchParams(window.location.search)
const KUNDE_ID  = params.get('kunde')  || 'demo'
const SCREEN_ID = params.get('screen') || 'screen1'
const IS_EDITOR = params.get('editor') === 'true'
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

const DAY_MAP    = { 2:'dienstag', 3:'mittwoch', 4:'donnerstag', 5:'freitag' }
const DAY_LABELS = { dienstag:'Dienstag', mittwoch:'Mittwoch', donnerstag:'Donnerstag', freitag:'Freitag' }

const LAYOUTS = {
  dienstag:   'assets/Bildschim_1_Dienstag.png',
  mittwoch:   'assets/Bildschirm_1_Mittwoch.png',
  donnerstag: 'assets/Bildschirm_1_Donnerstag.png',
  freitag:    'assets/Bildschirm_1_Freitag.png',
}

// Standard-Konfiguration (Fallback wenn Supabase leer)
let CONFIG = {
  dienstag:   { img:{x:12.5,y:30,r:3.8}, text:{x:12.5,y:55,w:20,size:1.8}, preis:{x:12.5,y:70,size:1.5,color:'#1a1a1a'} },
  mittwoch:   { img:{x:37.5,y:32,r:3.2}, text:{x:37.5,y:55,w:18,size:1.4}, preis:{x:37.5,y:68,size:1.2,color:'#ffffff'} },
  donnerstag: { img:{x:62.5,y:32,r:3.2}, text:{x:62.5,y:55,w:18,size:1.4}, preis:{x:62.5,y:68,size:1.2,color:'#1a1a1a'} },
  freitag:    { img:{x:87.5,y:32,r:3.2}, text:{x:87.5,y:55,w:18,size:1.4}, preis:{x:87.5,y:68,size:1.2,color:'#ffffff'} },
}

let currentContent = null
let testDay = null

// ── Tag ermitteln ──
function getTodayKey() {
  const t = params.get('testday') || (testDay ? String(testDay) : null)
  return DAY_MAP[t ? parseInt(t) : new Date().getDay()] || null
}

// ── KW ──
function getKW(d=new Date()) {
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()))
  date.setUTCDate(date.getUTCDate()+4-(date.getUTCDay()||7))
  const y=new Date(Date.UTC(date.getUTCFullYear(),0,1))
  return Math.ceil((((date-y)/86400000)+1)/7)
}

// ── Konfiguration aus Supabase laden ──
async function loadConfig() {
  try {
    const { data: cfgRows } = await sb.from('display_configs').select('config').eq('kunde_id', KUNDE_ID).eq('screen_id', SCREEN_ID).limit(1)
  const data = cfgRows?.[0] || null
    if (data?.config) CONFIG = { ...CONFIG, ...data.config }
  } catch(e) { /* nutze Standard-Config */ }
}

// ── Konfiguration in Supabase speichern ──
async function saveConfig() {
  // Werte aus Editor-Feldern lesen
  const days = ['dienstag','mittwoch','donnerstag','freitag']
  days.forEach(day => {
    CONFIG[day].img.x  = parseFloat(document.getElementById(`${day}_img_x`)?.value || CONFIG[day].img.x)
    CONFIG[day].img.y  = parseFloat(document.getElementById(`${day}_img_y`)?.value || CONFIG[day].img.y)
    CONFIG[day].img.r  = parseFloat(document.getElementById(`${day}_img_r`)?.value || CONFIG[day].img.r)
    CONFIG[day].text.x = parseFloat(document.getElementById(`${day}_text_x`)?.value || CONFIG[day].text.x)
    CONFIG[day].text.y = parseFloat(document.getElementById(`${day}_text_y`)?.value || CONFIG[day].text.y)
    CONFIG[day].text.size = parseFloat(document.getElementById(`${day}_text_size`)?.value || CONFIG[day].text.size)
    CONFIG[day].preis.x = parseFloat(document.getElementById(`${day}_preis_x`)?.value || CONFIG[day].preis.x)
    CONFIG[day].preis.y = parseFloat(document.getElementById(`${day}_preis_y`)?.value || CONFIG[day].preis.y)
    CONFIG[day].preis.size = parseFloat(document.getElementById(`${day}_preis_size`)?.value || CONFIG[day].preis.size)
    CONFIG[day].preis.color = document.getElementById(`${day}_preis_color`)?.value || CONFIG[day].preis.color
  })

  try {
    await sb.from('display_configs').upsert({ kunde_id: KUNDE_ID, screen_id: SCREEN_ID, config: CONFIG })
    document.getElementById('s-text').textContent = '✓ Gespeichert!'
    setTimeout(() => renderDisplay(currentContent), 300)
  } catch(e) {
    document.getElementById('s-text').textContent = 'Fehler beim Speichern'
  }
}

// ── Display rendern ──
function renderDisplay(content) {
  if (!content) return
  currentContent = content
  const todayKey = getTodayKey()

  if (!todayKey) {
    document.getElementById('no-content').classList.add('show')
    document.getElementById('bg-image').style.opacity = '0'
    return
  }
  document.getElementById('no-content').classList.remove('show')

  // Hintergrundbild
  const bgImg = document.getElementById('bg-image')
  const newSrc = LAYOUTS[todayKey]
  if (bgImg.getAttribute('data-src') !== newSrc) {
    bgImg.style.opacity = '0'
    const tmp = new Image()
    tmp.onload = () => { bgImg.src = newSrc; bgImg.style.opacity='1'; bgImg.setAttribute('data-src',newSrc) }
    tmp.src = newSrc
  }

  // Datum
  document.getElementById('datum-overlay').textContent = content.woche || ''

  // Gerichte
  const overlay = document.getElementById('gerichte-overlay')
  overlay.innerHTML = ''
  const gerichte = content.gerichte || {}

  Object.keys(CONFIG).forEach(day => {
    const m = gerichte[day]?.[0]
    if (!m?.name) return
    const cfg = CONFIG[day]
    const isToday = day === todayKey
    const editorClass = IS_EDITOR ? ' drag-handle' : ''

    // Bild-Kreis
    const imgSize = (cfg.img.r/100) * document.getElementById('screen').offsetWidth * 2
    const imgEl = document.createElement('div')
    imgEl.className = 'day-circle fade-in' + editorClass
    imgEl.setAttribute('data-day', day)
    imgEl.setAttribute('data-type', 'img')
    imgEl.style.cssText = `left:${cfg.img.x}%;top:${cfg.img.y}%;width:${imgSize}px;height:${imgSize}px;`
    if (m.bild) {
      imgEl.innerHTML = `<img src="../../${m.bild}" onerror="this.parentNode.innerHTML='<div class=placeholder>🍽️</div>'">`
    } else {
      imgEl.innerHTML = '<div class="placeholder">🍽️</div>'
    }
    overlay.appendChild(imgEl)

    // Text
    const txtEl = document.createElement('div')
    txtEl.className = 'day-text fade-in' + editorClass
    txtEl.setAttribute('data-day', day)
    txtEl.setAttribute('data-type', 'text')
    txtEl.style.cssText = `left:${cfg.text.x}%;top:${cfg.text.y}%;width:${cfg.text.w}%;font-size:${isToday ? cfg.text.size*1.3 : cfg.text.size}vw;font-weight:${isToday?800:600};color:#1a1a1a;`
    txtEl.textContent = m.name
    overlay.appendChild(txtEl)

    // Preis — NUR TEXT, keine Form
    if (m.preis) {
      const prEl = document.createElement('div')
      prEl.className = 'day-price fade-in' + editorClass
      prEl.setAttribute('data-day', day)
      prEl.setAttribute('data-type', 'preis')
      prEl.style.cssText = `left:${cfg.preis.x}%;top:${cfg.preis.y}%;font-size:${isToday ? cfg.preis.size*1.2 : cfg.preis.size}vw;color:${cfg.preis.color};`
      prEl.textContent = m.preis
      overlay.appendChild(prEl)
    }
  })

  document.getElementById('s-text').textContent = `Live · KW ${getKW()} · ${DAY_LABELS[todayKey]||'Heute'}`
}

// ── Demo Inhalt ──
function showDemo() {
  renderDisplay({
    woche: '28.04. - 02.05.2026',
    gerichte: {
      dienstag:   [{name:'Schäufele mit Knödel', preis:'8,50 €'}],
      mittwoch:   [{name:'Gulasch mit Spätzle',  preis:'6,80 €'}],
      donnerstag: [{name:'Cordon Bleu',           preis:'6,80 €'}],
      freitag:    [{name:'Backfisch',             preis:'6,80 €'}]
    }
  })
  document.getElementById('s-text').textContent = 'Demo-Modus'
}

// ── Supabase laden ──
async function loadContent() {
  try {
    const { data } = await sb.from('displays').select('content').eq('kunde_id',KUNDE_ID).eq('screen_id',SCREEN_ID).single()
    if (data?.content) renderDisplay(data.content)
    else showDemo()
  } catch(e) { showDemo() }
}

// ── Realtime ──
function subscribeRealtime() {
  sb.channel('disp-'+SCREEN_ID)
    .on('postgres_changes',{event:'*',schema:'public',table:'displays',filter:`kunde_id=eq.${KUNDE_ID}`},
      p => { if(p.new?.content) renderDisplay(p.new.content) })
    .subscribe(s => { if(s==='SUBSCRIBED') document.getElementById('s-text').textContent='● Live' })
}

// ── Editor ──
function toggleEditor() {
  document.getElementById('editor-panel').classList.toggle('open')
  buildEditorUI()
}

function livePreview() {
  const days = ['dienstag','mittwoch','donnerstag','freitag']
  days.forEach(day => {
    const ix = document.getElementById(day+'_img_x')
    if (!ix) return
    CONFIG[day].img.x   = parseFloat(ix.value) || CONFIG[day].img.x
    CONFIG[day].img.y   = parseFloat(document.getElementById(day+'_img_y')?.value) || CONFIG[day].img.y
    CONFIG[day].img.r   = parseFloat(document.getElementById(day+'_img_r')?.value) || CONFIG[day].img.r
    CONFIG[day].text.x  = parseFloat(document.getElementById(day+'_text_x')?.value) || CONFIG[day].text.x
    CONFIG[day].text.y  = parseFloat(document.getElementById(day+'_text_y')?.value) || CONFIG[day].text.y
    CONFIG[day].preis.x = parseFloat(document.getElementById(day+'_preis_x')?.value) || CONFIG[day].preis.x
    CONFIG[day].preis.y = parseFloat(document.getElementById(day+'_preis_y')?.value) || CONFIG[day].preis.y
  })
  if (currentContent) renderDisplay(currentContent)
  else showDemo()
}

function buildEditorUI() {
  const el = document.getElementById('ep-positions')
  const days = ['dienstag','mittwoch','donnerstag','freitag']
  el.innerHTML = days.map(day => `
    <div class="ep-day">
      <div class="ep-day-name">${DAY_LABELS[day]}</div>
      <div class="ep-row"><label>Bild X %</label><input type="number" id="${day}_img_x" value="${CONFIG[day].img.x}" step="0.5" oninput="livePreview()"></div>
      <div class="ep-row"><label>Bild Y %</label><input type="number" id="${day}_img_y" value="${CONFIG[day].img.y}" step="0.5" oninput="livePreview()"></div>
      <div class="ep-row"><label>Bild Radius</label><input type="number" id="${day}_img_r" value="${CONFIG[day].img.r}" step="0.1" oninput="livePreview()"></div>
      <div class="ep-row"><label>Text X %</label><input type="number" id="${day}_text_x" value="${CONFIG[day].text.x}" step="0.5" oninput="livePreview()"></div>
      <div class="ep-row"><label>Text Y %</label><input type="number" id="${day}_text_y" value="${CONFIG[day].text.y}" step="0.5" oninput="livePreview()"></div>
      <div class="ep-row"><label>Text Größe</label><input type="number" id="${day}_text_size" value="${CONFIG[day].text.size}" step="0.1"></div>
      <div class="ep-row"><label>Preis X %</label><input type="number" id="${day}_preis_x" value="${CONFIG[day].preis.x}" step="0.5" oninput="livePreview()"></div>
      <div class="ep-row"><label>Preis Y %</label><input type="number" id="${day}_preis_y" value="${CONFIG[day].preis.y}" step="0.5" oninput="livePreview()"></div>
      <div class="ep-row"><label>Preis Größe</label><input type="number" id="${day}_preis_size" value="${CONFIG[day].preis.size}" step="0.1"></div>
      <div class="ep-row"><label>Preis Farbe</label>
        <select id="${day}_preis_color">
          <option value="#1a1a1a" ${CONFIG[day].preis.color==='#1a1a1a'?'selected':''}>Dunkel</option>
          <option value="#ffffff" ${CONFIG[day].preis.color==='#ffffff'?'selected':''}>Weiß</option>
        </select>
      </div>
    </div>`).join('')
}

function setTestDay(day, btn) {
  // URL-Param überschreiben mit neuem testday
  const url = new URL(window.location.href)
  url.searchParams.set('testday', day)
  window.history.replaceState({}, '', url)
  // Hintergrundbild direkt wechseln
  const dayKey = DAY_MAP[day]
  const bgImg = document.getElementById('bg-image')
  bgImg.style.opacity = '0'
  const tmp = new Image()
  tmp.onload = () => { bgImg.src = LAYOUTS[dayKey]; bgImg.style.opacity='1'; bgImg.setAttribute('data-src', LAYOUTS[dayKey]) }
  tmp.src = LAYOUTS[dayKey]
  // Content neu rendern
  document.querySelectorAll('.ep-day-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  if (currentContent) renderDisplay(currentContent)
  else showDemo()
}

// ── Start ──
window.addEventListener('DOMContentLoaded', async () => {
  setInterval(() => {
    const n=new Date()
    document.getElementById('s-time').textContent=n.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' · KW '+getKW()
  },1000)

  await loadConfig()
  await loadContent()
  subscribeRealtime()

  if (IS_EDITOR) {
    document.getElementById('editor-panel').classList.add('open')
    buildEditorUI()
  }

  // Mitternacht
  const now=new Date(),midnight=new Date(now)
  midnight.setHours(24,0,5,0)
  setTimeout(()=>{ loadContent(); setInterval(loadContent,86400000) },midnight-now)
})
</script>
</body>
</html>
