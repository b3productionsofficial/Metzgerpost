<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetzgerPost Display</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:     #0f0d0b;
      --accent: #d4853a;
      --text:   #f0ece4;
      --muted:  #8a8070;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── Loading Screen ── */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg); z-index: 100;
    }
    .loading-logo {
      font-size: 48px; font-weight: 800;
      color: var(--text); margin-bottom: 16px;
    }
    .loading-logo span { color: var(--accent); }
    .loading-bar {
      width: 200px; height: 3px;
      background: rgba(212,133,58,0.2); border-radius: 2px; overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; background: var(--accent); border-radius: 2px;
      animation: loadFill 2s ease forwards;
    }
    @keyframes loadFill { from { width: 0; } to { width: 100%; } }

    /* ── Content Wrapper ── */
    #content-wrapper {
      flex: 1; position: relative; overflow: hidden;
    }

    /* ── Mittagstisch Display (Landscape 16:9) ── */
    .display-mittagstisch {
      width: 100%; height: 100%;
      display: grid; grid-template-columns: 1fr 2fr;
      background: #f8f5f0;
    }
    .display-left {
      background: #2d4a2d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px;
      gap: 20px;
    }
    .display-logo-area {
      text-align: center; color: #f8f5f0;
    }
    .display-logo-area h1 { font-size: clamp(20px, 3vw, 36px); font-weight: 800; margin-bottom: 8px; }
    .display-logo-area p  { font-size: clamp(12px, 1.5vw, 18px); opacity: 0.7; }
    .display-woche {
      background: rgba(255,255,255,0.12);
      border-radius: 12px; padding: 12px 20px;
      color: #f8f5f0; text-align: center;
      font-size: clamp(14px, 2vw, 22px); font-weight: 700;
    }
    .display-right {
      display: grid; grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px; background: #ddd8d0; padding: 2px;
    }
    .display-meal {
      background: #f8f5f0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px; gap: 10px; text-align: center;
    }
    .display-meal-img {
      width: clamp(60px, 8vw, 100px); height: clamp(60px, 8vw, 100px);
      border-radius: 50%; object-fit: cover;
      border: 3px solid #2d4a2d;
    }
    .display-meal-day {
      font-size: clamp(10px, 1.2vw, 14px);
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #2d4a2d;
    }
    .display-meal-name {
      font-size: clamp(12px, 1.5vw, 18px); font-weight: 600;
      color: #1a1a1a; line-height: 1.3;
    }
    .display-meal-price {
      background: #2d4a2d; color: #f8f5f0;
      font-size: clamp(12px, 1.5vw, 18px); font-weight: 700;
      padding: 4px 14px; border-radius: 20px;
    }

    /* ── Status Bar ── */
    #status-bar {
      height: 36px;
      background: rgba(15,13,11,0.9);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      font-size: 12px; color: var(--muted);
    }
    .status-live {
      display: flex; align-items: center; gap: 6px; color: #5cad7a;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #5cad7a;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Fallback / Offline ── */
    .display-offline {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; color: var(--muted);
    }
    .display-offline-icon { font-size: 64px; }
    .display-offline h2 { font-size: 24px; font-weight: 700; color: var(--text); }
    .display-offline p  { font-size: 15px; }

    /* Transition */
    .fade-enter { animation: fadeIn 0.5s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loading-logo">Metzger<span>Post</span></div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<!-- Content -->
<div id="content-wrapper"></div>

<!-- Status Bar -->
<div id="status-bar">
  <div class="status-live">
    <div class="status-dot"></div>
    <span id="status-text">Verbinde…</span>
  </div>
  <span id="status-time"></span>
</div>

<script src="../../shared/supabase.js"></script>
<script>
const params   = new URLSearchParams(window.location.search)
const KUNDE_ID = params.get('kunde') || 'demo'
const SCREEN_ID= params.get('screen') || 'screen1'

const dayNames = { montag:'Montag', dienstag:'Dienstag', mittwoch:'Mittwoch', donnerstag:'Donnerstag', freitag:'Freitag' }

let currentContent = null
let refreshTimer   = null

/* ── Init ── */
window.addEventListener('DOMContentLoaded', async () => {
  // Uhr
  setInterval(() => {
    const now = new Date()
    document.getElementById('status-time').textContent =
      now.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' })
  }, 1000)

  // Erst laden
  await loadContent()

  // Loading ausblenden
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none'
  }, 2000)

  // Alle 30 Sek neu laden
  setInterval(loadContent, 30000)
})

/* ── Content laden ── */
async function loadContent() {
  try {
    const data = await MP.getDisplayContent(KUNDE_ID, SCREEN_ID)
    if (!data) { showOffline(); return }

    // Nur neu rendern wenn Inhalt sich geändert hat
    const contentHash = JSON.stringify(data.content)
    if (contentHash === currentContent) return
    currentContent = contentHash

    renderContent(data.content)
    document.getElementById('status-text').textContent =
      `Live · ${KUNDE_ID} · ${SCREEN_ID}`

  } catch(e) {
    console.error(e)
    showOffline()
  }
}

/* ── Content rendern ── */
function renderContent(content) {
  const wrapper = document.getElementById('content-wrapper')
  wrapper.innerHTML = ''

  if (content.type === 'mittagstisch' || content.type === 'tagesgerichte') {
    wrapper.innerHTML = buildMittagstisch(content)
  } else {
    showOffline()
    return
  }

  wrapper.querySelector('.display-mittagstisch')?.classList.add('fade-enter')
}

function buildMittagstisch(content) {
  const gerichte = content.gerichte || {}
  const active   = Object.keys(gerichte).filter(d => gerichte[d]?.length > 0)
  const woche    = content.woche || ''

  const mealsHtml = active.slice(0, 4).map(day => {
    const m = gerichte[day]?.[0]
    if (!m?.name) return ''
    return `
      <div class="display-meal">
        <div class="display-meal-day">${dayNames[day] || day}</div>
        <div class="display-meal-name">${m.name}</div>
        ${m.preis ? `<div class="display-meal-price">${m.preis}</div>` : ''}
      </div>`
  }).join('')

  return `
    <div class="display-mittagstisch fade-enter">
      <div class="display-left">
        <div class="display-logo-area">
          <h1>Metzger<span style="color:#d4853a">Post</span></h1>
          <p>Mittagstisch der Woche</p>
        </div>
        ${woche ? `<div class="display-woche">📅 ${woche}</div>` : ''}
      </div>
      <div class="display-right">
        ${mealsHtml || '<div class="display-meal"><p>Keine Gerichte</p></div>'}
      </div>
    </div>`
}

function showOffline() {
  const wrapper = document.getElementById('content-wrapper')
  wrapper.innerHTML = `
    <div class="display-offline">
      <div class="display-offline-icon">📺</div>
      <h2>Kein Inhalt</h2>
      <p>Sende Inhalte über den Display Manager</p>
    </div>`
  document.getElementById('status-text').textContent = 'Warte auf Inhalt…'
}
</script>
</body>
</html>
