<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MetzgerPost — Screen 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
    #screen{position:relative;width:100vw;height:calc(100vw * 9/16);max-height:100vh;max-width:calc(100vh * 16/9);overflow:hidden}
    .slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease}
    .slide.active{opacity:1}
    .slide img{width:100%;height:100%;object-fit:fill}
    .slide-overlay{position:absolute;inset:0;pointer-events:none}

    /* Sektionen-Grid */
    .sektionen-wrap{
      position:absolute;
      left:27%;top:18%;width:70%;height:78%;
      display:flex;flex-direction:column;
      gap:0;
    }
    .sektion{margin-bottom:1.2vw}
    .sektion-titel{
      font-family:'Playfair Display',Georgia,serif;
      font-weight:700;font-size:1.8vw;
      color:#1a1a1a;margin-bottom:0.4vw;
    }
    .sektion-items{display:grid;grid-template-columns:1fr 1fr;gap:0 2vw}
    .item-zeile{
      display:flex;justify-content:space-between;
      font-family:Georgia,serif;font-size:1.15vw;
      color:#1a1a1a;line-height:1.7;
    }
    .item-name{flex:1}
    .item-preis{text-align:right;min-width:5vw;margin-left:1vw}

    /* Timer-Bar */
    #timer-bar{position:absolute;bottom:0;left:0;height:3px;background:#2d6a4f;transition:none}

    /* Vollbild */
    #fs-btn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;border:2px solid rgba(255,255,255,.8);padding:24px 52px;font-size:3vw;font-family:Georgia,serif;border-radius:16px;cursor:pointer;z-index:9999;transition:opacity .6s}
    #fs-btn.hidden{opacity:0;pointer-events:none}
    #back-btn{display:none;position:fixed;top:12px;left:12px;background:rgba(0,0,0,.7);color:#fff;border:1px solid rgba(255,255,255,.3);padding:8px 14px;font-size:13px;font-family:Georgia,serif;border-radius:8px;cursor:pointer;z-index:9998;text-decoration:none}
    #back-btn.show{display:block}
  </style>
</head>
<body>


<a id="back-btn" href="../display/index.html">&#8592; Display Manager</a>

<div id="screen">
  <div id="slides-container"></div>
  <div id="timer-bar"></div>
</div>

<script>
var SUPABASE_URL  = 'https://jfrqbchgrpixwlecerax.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcnFiY2hncnBpeHdsZWNlcmF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODk5NDksImV4cCI6MjA5MDE2NTk0OX0.AnSqi2rJ46PN8dm6zMUgRDNMdXlwRRaES4JQ4Fozn10';

function getParam(n){var s=window.location.search;if(!s)return null;var p=s.substring(1).split('&');for(var i=0;i<p.length;i++){var kv=p[i].split('=');if(decodeURIComponent(kv[0])===n)return kv.length>1?decodeURIComponent(kv[1]):''}return null}

var KUNDE_ID = getParam('kunde') || 'demo';
var sb = null;
var slides = [];
var currentSlide = 0;
var timerSek = 8;
var slideInterval = null;
var timerAnimation = null;

// Demo-Daten
var DEMO_SLIDES = [
  {
    bild: '',
    sektionen: [
      { titel: 'Duroc Schwein', items: [
        {name:'Rücken', preis:'14,00 €/kg'},{name:'Bauch', preis:'10,00 €/kg'},
        {name:'Schäufele', preis:'10,20 €/kg'},{name:'Rippchen', preis:'9,50 €/kg'}
      ]},
      { titel: 'Rind', items: [
        {name:'Blattschulter', preis:'15,40 €/kg'},{name:'Hohe Rippe', preis:'15,73 €/kg'},
        {name:'Bürgermeisterstück', preis:'18,92 €/kg'},{name:'Roulade Oberschale', preis:'23,70 €/kg'},
        {name:'Roastbeef', preis:'26,29 €/kg'},{name:'falsches Filet', preis:'15,40 €/kg'}
      ]},
      { titel: 'Schwein', items: [
        {name:'Kotlett mit Knochen', preis:'11,00 €/kg'},{name:'Schulter', preis:'10,80 €/kg'},
        {name:'Schäufele', preis:'7,70 €/kg'},{name:'Gulasch', preis:'12,10 €/kg'},
        {name:'Hackfleisch gem.', preis:'11,70 €/kg'},{name:'Filet', preis:'14,30 €/kg'}
      ]}
    ]
  },
  {
    bild: '',
    sektionen: [
      { titel: 'Ofengerichte', items: [
        {name:'Lasagne 650g', preis:'5,50 €'},{name:'gefüllte Roulade', preis:'6,00 €'},
        {name:'Knöchle', preis:'9,00 €'}
      ]},
      { titel: 'Pfannengerichte', items: [
        {name:'Schnitzel', preis:'5,50 €'},{name:'Cordon bleu', preis:'6,00 €'},
        {name:'Schaschlik', preis:'9,00 €'}
      ]},
      { titel: 'Geschnetzeltes', items: [
        {name:'Gyros Schwein', preis:'11,00 €/kg'},{name:'Gyros Duroc', preis:'10,80 €/kg'},
        {name:'Bombay', preis:'7,70 €/kg'},{name:'Putengeschnetzeltes', preis:'12,10 €/kg'},
        {name:'Kalbsgeschnetzeltes', preis:'14,30 €/kg'}
      ]}
    ]
  }
];

function getParam(n){var s=window.location.search;if(!s)return null;var p=s.substring(1).split('&');for(var i=0;i<p.length;i++){var kv=p[i].split('=');if(decodeURIComponent(kv[0])===n)return kv.length>1?decodeURIComponent(kv[1]):''}return null}

function goFullscreen(){var el=document.documentElement;if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();document.getElementById('fs-btn').className='hidden'}
document.addEventListener('fullscreenchange',function(){if(!document.fullscreenElement&&!document.webkitFullscreenElement)document.getElementById('fs-btn').className=''});
document.addEventListener('webkitfullscreenchange',function(){if(!document.fullscreenElement&&!document.webkitFullscreenElement)document.getElementById('fs-btn').className=''});

function renderSlides(data){
  // Neue Logik: aktive_layouts wie screen3
  var layouts = data.aktive_layouts || data.slides || DEMO_SLIDES;
  if (layouts.length && layouts[0].bild !== undefined && !layouts[0].sektionen) {
    // Nur Bilder - wie screen3
    var container = document.getElementById('slides-container');
    container.innerHTML = '';
    slides = layouts;
    timerSek = data.timer_sekunden || 8;
    for (var i=0;i<slides.length;i++) {
      var div=document.createElement('div');
      div.className='slide'+(i===0?' active':'');
      div.id='slide-'+i;
      var img=document.createElement('img');
      img.src=slides[i].bild;
      div.appendChild(img);
      container.appendChild(div);
    }
    startSlideshow();
    return;
  }
  // Alte Logik mit Sektionen
  _renderSlidesOld(data);
}
function _renderSlidesOld(data){
  slides = data.slides || DEMO_SLIDES;
  timerSek = data.timer_sekunden || 8;
  var container = document.getElementById('slides-container');
  container.innerHTML = '';
  for(var i=0;i<slides.length;i++){
    var s=slides[i];
    var div=document.createElement('div');
    div.className='slide'+(i===0?' active':'');
    div.id='slide-'+i;
    // Bild
    var img=document.createElement('img');
    img.src=s.bild;
    div.appendChild(img);
    // Overlay mit Sektionen
    var ov=document.createElement('div');
    ov.className='slide-overlay';
    var wrap=document.createElement('div');
    wrap.className='sektionen-wrap';
    var sek=s.sektionen||[];
    for(var j=0;j<sek.length;j++){
      var sektion=sek[j];
      var sDiv=document.createElement('div');
      sDiv.className='sektion';
      var titel=document.createElement('div');
      titel.className='sektion-titel';
      titel.textContent=sektion.titel;
      sDiv.appendChild(titel);
      var itemsDiv=document.createElement('div');
      itemsDiv.className='sektion-items';
      var items=sektion.items||[];
      for(var k=0;k<items.length;k++){
        var zeile=document.createElement('div');
        zeile.className='item-zeile';
        var name=document.createElement('span');
        name.className='item-name';
        name.textContent=items[k].name;
        var preis=document.createElement('span');
        preis.className='item-preis';
        preis.textContent=items[k].preis;
        zeile.appendChild(name);
        zeile.appendChild(preis);
        itemsDiv.appendChild(zeile);
      }
      sDiv.appendChild(itemsDiv);
      wrap.appendChild(sDiv);
    }
    ov.appendChild(wrap);
    div.appendChild(ov);
    container.appendChild(div);
  }
  startSlideshow();
}

function startSlideshow(){
  if(slideInterval)clearInterval(slideInterval);
  currentSlide=0;
  showSlide(0);
  slideInterval=setInterval(function(){
    currentSlide=(currentSlide+1)%slides.length;
    showSlide(currentSlide);
  },timerSek*1000);
}

function showSlide(idx){
  var all=document.querySelectorAll('.slide');
  for(var i=0;i<all.length;i++)all[i].className='slide';
  var el=document.getElementById('slide-'+idx);
  if(el)el.className='slide active';
  // Timer-Bar Animation
  var bar=document.getElementById('timer-bar');
  bar.style.transition='none';bar.style.width='0%';
  setTimeout(function(){
    bar.style.transition='width '+timerSek+'s linear';
    bar.style.width='100%';
  },50);
}

function loadConfig(){
  if(!sb){renderSlides({slides:DEMO_SLIDES,timer_sekunden:8});return}
  sb.from('screen2_config').select('*').eq('kunde_id',KUNDE_ID).limit(1)
    .then(function(r){
      var d=r&&r.data&&r.data[0];
      if(d&&d.slides&&d.slides.length>0)renderSlides(d);
      else renderSlides({slides:DEMO_SLIDES,timer_sekunden:8});
    }).catch(function(){renderSlides({slides:DEMO_SLIDES,timer_sekunden:8})});
}

function subscribeRealtime(){
  if(!sb)return;
  try{
    sb.channel('sc2-'+KUNDE_ID)
      .on('postgres_changes',{event:'*',schema:'public',table:'screen2_config',filter:'kunde_id=eq.'+KUNDE_ID},
        function(){loadConfig()})
      .subscribe(function(){});
  }catch(e){setInterval(loadConfig,60000)}
}

window.addEventListener('DOMContentLoaded',function(){
  if(!window.supabase){renderSlides({slides:DEMO_SLIDES,timer_sekunden:8});return}
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
  loadConfig();
  subscribeRealtime();
});
</script>
</body>
</html>
